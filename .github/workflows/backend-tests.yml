name: Backend tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clockinn
          POSTGRES_PASSWORD: clockinn
          POSTGRES_DB: clockinn
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clockinn -d clockinn"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://clockinn:clockinn@127.0.0.1:5432/clockinn
      SECRET_KEY: ci-test-secret-not-for-production-min-32-chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: server

      - name: Create clockinn_test database
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          PGPASSWORD=clockinn psql -h 127.0.0.1 -U clockinn -d postgres -c "CREATE DATABASE clockinn_test;"

      - name: Run pytest
        run: python -m pytest -q
        working-directory: server
